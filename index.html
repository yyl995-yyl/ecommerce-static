<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简电商 - 商品列表</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>🛍️ 极简电商</h1>
        <p>部署在GitHub Pages的静态电商网站</p>
    </header>

    <div class="container">
        <div class="filters">
            <label for="categoryFilter">分类筛选：</label>
            <select id="categoryFilter" class="filter-select">
                <option value="">所有分类</option>
                <option value="electronics">电子产品</option>
                <option value="clothing">服装</option>
                <option value="home">家居</option>
                <option value="books">图书</option>
            </select>
        </div>

        <div id="productsContainer" class="products-grid">
            <div style="text-align: center; padding: 3rem; font-size: 1.2rem; color: #666;">
                正在加载商品数据...
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 极简电商 - 专属访问</p>
        <button class="logout-btn" onclick="logout()">🚪 退出登录</button>
    </footer>

    <script>
        // 🔐 认证检查
        function checkAuthentication() {
            const authenticated = localStorage.getItem('authenticated');
            const authTimestamp = localStorage.getItem('authTimestamp');
            
            if (authenticated === 'true' && authTimestamp) {
                const hoursSinceAuth = (Date.now() - parseInt(authTimestamp)) / (1000 * 60 * 60);
                if (hoursSinceAuth < 24) {
                    return true;
                }
            }
            
            window.location.href = 'login.html';
            return false;
        }

        // 商品数据
        const PRODUCTS_DATA = [
            {
                id: 1,
                title: "iPhone 15 Pro",
                price: 999.99,
                description: "最新款iPhone，搭载A17 Pro芯片，性能强劲，拍照出色",
                image_url: "iphone15.jpg",
                category: "electronics"
            },
            {
                id: 2,
                title: "MacBook Pro",
                price: 1999.99,
                description: "专业级笔记本电脑，M3芯片，适合编程和设计工作",
                image_url: "macbook.jpg",
                category: "electronics"
            },
            {
                id: 3,
                title: "Nike Air Max",
                price: 129.99,
                description: "舒适的运动鞋，气垫设计，适合日常穿着和运动",
                image_url: "nike.jpg",
                category: "clothing"
            },
            {
                id: 4,
                title: "咖啡杯套装",
                price: 29.99,
                description: "精美陶瓷咖啡杯，4件套，适合家庭和办公室使用",
                image_url: "coffee.jpg",
                category: "home"
            },
            {
                id: 5,
                title: "Python编程书籍",
                price: 49.99,
                description: "Python编程从入门到精通，适合初学者和进阶开发者",
                image_url: "pythonBook.jpg",
                category: "books"
            }
        ];

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 先检查认证
            if (!checkAuthentication()) {
                return;
            }
            
            // 加载商品
            loadProducts();
            
            // 绑定筛选事件
            document.getElementById('categoryFilter').addEventListener('change', function(e) {
                loadProducts(e.target.value);
            });
        });

        // 加载商品
        function loadProducts(category = '') {
            const container = document.getElementById('productsContainer');
            
            let filteredProducts = PRODUCTS_DATA;
            if (category) {
                filteredProducts = PRODUCTS_DATA.filter(product => product.category === category);
            }
            
            displayProducts(filteredProducts);
        }

        // 显示商品
        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 3rem; color: #e74c3c; background: #ffeaea; border-radius: 10px;">暂无商品数据</div>';
                return;
            }
            
            container.innerHTML = products.map(product => `
                <div class="product-card" onclick="viewProductDetail(${product.id})">
                    <img src="${product.image_url}" alt="${product.title}" class="product-image" 
                         onerror="this.src='https://via.placeholder.com/300x300/cccccc/666666?text=图片加载失败'">
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <div class="product-price">¥${product.price}</div>
                        <p class="product-description">${product.description}</p>
                        <span class="product-category">${getCategoryName(product.category)}</span>
                    </div>
                </div>
            `).join('');
        }

        // 获取分类名称
        function getCategoryName(category) {
            const categoryMap = {
                'electronics': '电子产品',
                'clothing': '服装',
                'home': '家居',
                'books': '图书'
            };
            return categoryMap[category] || category;
        }

        // 查看商品详情
        function viewProductDetail(productId) {
            window.location.href = `detail.html?id=${productId}`;
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('authenticated');
            localStorage.removeItem('authTimestamp');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
